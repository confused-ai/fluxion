# Stale — automatically marks and closes inactive issues and PRs.
# Issues idle >60 days → labelled "stale" + comment.
# Stale issues idle >7 more days → closed.
# PRs idle >30 days → labelled "stale" + comment.
# Stale PRs idle >14 more days → closed.
# Issues/PRs with "pinned", "security", or "wontclose" labels are exempt.

name: Stale

on:
  schedule:
    # Every day at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark and close stale items
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          # ── Issues ────────────────────────────────────────────────────────
          days-before-issue-stale: 60
          days-before-issue-close: 7
          stale-issue-label: "stale"
          stale-issue-message: >
            This issue has been inactive for 60 days. It will be closed in 7
            days if no further activity occurs. If this is still relevant,
            please leave a comment or remove the `stale` label.
          close-issue-message: >
            Closing due to inactivity. Please re-open if this is still relevant.

          # ── Pull Requests ─────────────────────────────────────────────────
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-pr-label: "stale"
          stale-pr-message: >
            This PR has been inactive for 30 days. It will be closed in 14
            days unless updated. Ping a maintainer or push a new commit to
            keep it open.
          close-pr-message: >
            Closing due to inactivity. Feel free to reopen or create a new PR.

          # ── Exemptions ────────────────────────────────────────────────────
          exempt-issue-labels: "pinned,security,wontclose,good first issue,help wanted"
          exempt-pr-labels: "pinned,security,wontclose,do-not-close"
          exempt-all-milestones: true
