<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="fv-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="fv-node" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#e9d5ff"/>
      <stop offset="100%" stop-color="#a5f3fc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#fv-bg)"/>

  <!-- Spokes: hub (16,16) → top (16,6), bottom-left (8,22), bottom-right (24,22) -->
  <line x1="16" y1="16" x2="16" y2="7"
        stroke="rgba(255,255,255,0.75)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="9"  y2="22"
        stroke="rgba(255,255,255,0.75)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="23" y2="22"
        stroke="rgba(255,255,255,0.75)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Outer triangle -->
  <line x1="16" y1="7" x2="9"  y2="22"
        stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-linecap="round"/>
  <line x1="16" y1="7" x2="23" y2="22"
        stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-linecap="round"/>
  <line x1="9"  y1="22" x2="23" y2="22"
        stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-linecap="round"/>

  <!-- Satellite nodes -->
  <circle cx="16" cy="7"  r="3" fill="url(#fv-node)"/>
  <circle cx="16" cy="7"  r="1.6" fill="white"/>

  <circle cx="9"  cy="22" r="3" fill="url(#fv-node)"/>
  <circle cx="9"  cy="22" r="1.6" fill="white"/>

  <circle cx="23" cy="22" r="3" fill="url(#fv-node)"/>
  <circle cx="23" cy="22" r="1.6" fill="white"/>

  <!-- Center hub -->
  <circle cx="16" cy="16" r="4.5" fill="url(#fv-node)"/>
  <circle cx="16" cy="16" r="2.5" fill="white"/>
</svg>